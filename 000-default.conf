<VirtualHost *:10000>
    ServerName yahikoearn05.local
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/yahikoearn05-error.log
    CustomLog ${APACHE_LOG_DIR}/yahikoearn05-access.log combined
</VirtualHost>
